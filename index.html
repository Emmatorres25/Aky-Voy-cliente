<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);overflow-x:hidden;min-height:100vh;min-height:100dvh}

@keyframes sU{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fI{from{opacity:0}to{opacity:1}}
@keyframes tI{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tO{from{opacity:1}to{opacity:0;transform:translateX(110%)}}
@keyframes hP{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes mM{0%{transform:translateX(-2px) rotate(-1deg)}50%{transform:translateX(2px) rotate(1deg)}100%{transform:translateX(-2px) rotate(-1deg)}}

.toast{pointer-events:auto;background:var(--cd);border:1px solid var(--bd);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:9px;animation:tI .3s ease-out;box-shadow:0 8px 20px rgba(0,0,0,.4)}
.toast.out{animation:tO .25s ease-in forwards}

.tB{flex:1;min-width:0}.tT{font-weight:600;font-size:12px}.tM{font-size:11px;color:var(--tx2);margin-top:1px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(12,10,21,.94);backdrop-filter:blur(18px);border-top:1px solid var(--bd);display:flex;justify-content:space-around;padding:6px 0;max(6px,env(safe-area-inset-bottom));z-index:100}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--tx3);font-size:10px;padding:3px 10px;-webkit-user-select:none;user-select:none}
.ni.on{color:var(--pl)}.ni i{font-size:18px}
.moO{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fI .2s}
.moC{background:var(--cd);border:1px solid var(--bd);border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:480px;max-height:85dvh;overflow-y:auto;animation:sU .3s ease-out}
.pbar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}.pfill{height:100%;border-radius:3px;transition:width .4s ease}
.reelsC{height:calc(100dvh - 65px);overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}.reelsC::-webkit-scrollbar{display:none}
.reelC{height:calc(100dvh - 65px);scroll-snap-align:start;position:relative;overflow:hidden}

.motoMk{animation:mM .5s ease-in-out infinite}
.lo{position:absolute;border-radius:50%;filter:blur(70px);opacity:.3;animation:oF 7s ease-in-out infinite}
